<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZION Systems Robotic</title>
<style>
:root{--p:#00d4ff;--s:#0055ff;--a:#ff2a6d;--bg:#0a0e17;--txt:#e0e6ed;--card:#111827;--bdr:#1f2937}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
nav{position:fixed;top:0;width:100%;background:var(--bg);border-bottom:1px solid var(--bdr);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100}
.logo{color:var(--p);font-weight:700;font-size:1.2rem}
.nav-links a{color:var(--txt);text-decoration:none;margin-left:1.5rem}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 2rem}
.hero h1{font-size:2.5rem;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
.btn{background:var(--p);color:#fff;padding:0.8rem 2rem;border:none;border-radius:50px;cursor:pointer;font-size:1rem;margin-top:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;padding:4rem 2rem;max-width:1200px;margin:0 auto}
.card{background:var(--card);border-radius:12px;padding:1.5rem;text-align:center;border:1px solid var(--bdr)}
.card h3{color:var(--p);margin:0.5rem 0}
.price{font-size:1.3rem;font-weight:700;color:var(--txt)}
.chat{position:fixed;bottom:2rem;right:2rem;width:60px;height:60px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 15px rgba(0,212,255,0.4)}
footer{text-align:center;padding:2rem;border-top:1px solid var(--bdr);margin-top:4rem;color:var(--txt);opacity:0.7}
</style>
</head>
<body>
<nav>
<div class="logo">🤖 AZION Systems</div>
<div class="nav-links">
<a href="#home">Accueil</a>
<a href="#products">Produits</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero" id="home">
<h1>Solutions Robotiques & Systèmes Intelligents</h1>
<p>Innovation, précision et automation pour l'industrie moderne</p>
<button class="btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Découvrir nos solutions</button>
</section>

<section id="products">
<h2 style="text-align:center;margin-bottom:2rem;font-size:2rem">Nos Systèmes</h2>
<div class="grid" id="grid"></div>
</section>

<footer>© 2026 AZION Systems Robotic - Tous droits réservés</footer>
<div class="chat" onclick="alert('Support technique: support@azion.systems')">💬</div>

<script>
const products=[
{id:1,name:"Bras Robotique AZ-7",price:45000,icon:"🤖"},
{id:2,name:"Contrôleur IA Edge",price:12500,icon:"🧠"},
{id:3,name:"Kit Capteurs Lidar",price:8900,icon:"📡"},
{id:4,name:"Châssis Mobile Autonome",price:18500,icon:""},
{id:5,name:"Vision System 4K",price:9900,icon:"️"},
{id:6,name:"Station Programmation",price:6500,icon:"💻"}
];
const grid=document.getElementById('grid');
products.forEach(p=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<div style="font-size:3rem">${p.icon}</div><h3>${p.name}</h3><div class="price">${p.price} MAD</div><button class="btn" style="margin-top:1rem;width:100%" onclick="alert('Devis demandé pour: ${p.name}')">Demander un devis</button>`;
grid.appendChild(card);
});
</script>
</body>
</html>
